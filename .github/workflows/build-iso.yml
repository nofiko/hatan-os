name: Build HATAN OS ISO

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'build/**'
      - 'installer/**'
      - 'ui/installer/**'
      - 'scripts/hatan-live-installer.sh'
      - '.github/workflows/build-iso.yml'

jobs:
  build-iso-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso rsync git base-devel

      - name: Build ISO
        run: |
          chmod +x build/build-iso.sh
          ./build/build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hatan-os-iso
          path: build/output/*.iso
          retention-days: 14
