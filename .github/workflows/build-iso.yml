name: Build HATAN OS ISO

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
    paths:
      - 'build/**'
      - 'installer/**'
      - 'ui/**'
      - 'base/**'
      - 'config/**'
      - 'scripts/**'
      - 'themes/**'
      - 'media-ref/**'
      - '.github/workflows/build-iso.yml'

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO in Arch Linux container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            archlinux/archlinux:latest \
            bash -euxo pipefail -c '
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm archiso rsync
              bash build/build-iso.sh
            '

      - name: List output
        run: ls -lh build/output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hatan-os-iso-${{ github.sha }}
          path: build/output/hatan-os-*.iso
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/output/hatan-os-*.iso
          generate_release_notes: true
