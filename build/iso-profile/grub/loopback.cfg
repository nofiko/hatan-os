# HATAN OS — loopback (Ventoy / ISO من داخل نظام آخر)

search --no-floppy --set=archiso_img_dev --file "${iso_path}"
probe --set archiso_img_dev_uuid --fs-uuid "${archiso_img_dev}"

set default=hatan-auto
set timeout=20

menuentry "HATAN OS — Auto Install (Deck)" --id hatan-auto {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS img_dev=UUID=${archiso_img_dev_uuid} img_loop="${iso_path}" cow_spacesize=4G nvme_load=yes amd_iommu=off amdgpu.dc=1 rd.systemd.gpt_auto=no loglevel=3 hatan.autoinstall=1
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS Installer (Deck)" --id hatan-install {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS img_dev=UUID=${archiso_img_dev_uuid} img_loop="${iso_path}" cow_spacesize=4G nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}
