# HATAN OS — GRUB UEFI (يقرأ النواة من ISO، لا يحتاج FAT كبير)

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output console
fi

if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

set default=hatan-auto
set timeout=20
set timeout_style=menu

menuentry "HATAN OS — Auto Install (Deck)" --class arch --id hatan-auto {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nvme_load=yes amd_iommu=off amdgpu.dc=1 amdgpu.dpm=1 rd.systemd.gpt_auto=no loglevel=3 modprobe.blacklist=nouveau hatan.autoinstall=1
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS Installer (Deck)" --class arch --id hatan-install {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nvme_load=yes amd_iommu=off amdgpu.dc=1 amdgpu.dpm=1 rd.systemd.gpt_auto=no loglevel=3 modprobe.blacklist=nouveau
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS — Safe Boot (Deck USB)" --class arch --id hatan-safe {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS — Minimal (Deck fallback)" --class arch --id hatan-minimal {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nomodeset nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

if [ "${grub_platform}" == 'efi' ]; then
    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi
