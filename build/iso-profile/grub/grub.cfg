# HATAN OS — GRUB UEFI x86_64 (Steam Deck)
# يستخدم %ARCHISO_UUID% لاكتشاف الوسيط — أكثر موثوقية من archisolabel على USB

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output console
fi

if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

set default=hatan-auto
set timeout=20
set timeout_style=menu

# udevtimeout + nomodeset: يمنع التعليق عند "triggering uevents..." على Steam Deck
# amdgpu.dc/dpm تُفعَّل بعد الإقلاع الكامل من النظام المثبَّت

menuentry "HATAN OS — Auto Install (Deck)" --class arch --id hatan-auto {
    set gfxpayload=keep
    # hatan.autoinstall=1 يفتح الواجهة على خطوة الواي فاي — التثبيت يبدأ يدوياً بعد الاتصال
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset udevtimeout=60 nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3 modprobe.blacklist=nouveau hatan.autoinstall=1
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS Installer (Deck)" --class arch --id hatan-install {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset udevtimeout=60 nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3 modprobe.blacklist=nouveau
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS — Safe Boot (Deck USB)" --class arch --id hatan-safe {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset udevtimeout=60 nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

menuentry "HATAN OS — Minimal (Deck fallback)" --class arch --id hatan-minimal {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset udevtimeout=60 nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
}

if [ "${grub_platform}" == 'efi' ]; then
    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi
