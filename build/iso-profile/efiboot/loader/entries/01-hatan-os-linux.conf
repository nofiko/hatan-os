title HATAN OS Installer (Deck)
sort-key 01
linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune
initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
options archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nvme_load=yes amdgpu.dc=1 amdgpu.dpm=1 modprobe.blacklist=nouveau
