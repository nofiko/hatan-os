title HATAN OS — Minimal (Deck fallback)
sort-key 03
linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune
initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
options archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nomodeset nvme_load=yes amd_iommu=off rd.systemd.gpt_auto=no loglevel=3
