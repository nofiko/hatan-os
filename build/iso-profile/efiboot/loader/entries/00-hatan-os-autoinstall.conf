title HATAN OS — Auto Install (Deck)
sort-key 00
linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-neptune
initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-neptune.img
options archisobasedir=%INSTALL_DIR% archisolabel=HATAN_OS cow_spacesize=4G nvme_load=yes amd_iommu=off amdgpu.dc=1 amdgpu.dpm=1 rd.systemd.gpt_auto=no loglevel=3 modprobe.blacklist=nouveau hatan.autoinstall=1
