#
# HATAN OS ISO — Arch + مستودعات Valve (Steam Deck)
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

IgnorePkg   = linux linux-headers linux-neptune linux-neptune-headers
              gamescope steam-jupiter-stable jupiter-hw-support
              jupiter-legacy-support jupiter-fan-control mesa
              linux-firmware-neptune wireplumber sddm-wayland

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

[jupiter-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[holo-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never
