### BEGIN /etc/grub.d/00_header ###
insmod part_gpt
insmod part_msdos
if [ -s $prefix/grubenv ]; then
  load_env
fi
if [ "${next_entry}" ] ; then
   set default="${next_entry}"
   set next_entry=
   save_env next_entry
   set boot_once=true
else
   set default="0"
fi

if [ x"${feature_menuentry_id}" = xy ]; then
  menuentry_id_option="--id"
else
  menuentry_id_option=""
fi

export menuentry_id_option

if [ "${prev_saved_entry}" ]; then
  set saved_entry="${prev_saved_entry}"
  save_env saved_entry
  set prev_saved_entry=
  save_env prev_saved_entry
  set boot_once=true
fi

function savedefault {
  if [ -z "${boot_once}" ]; then
    saved_entry="${chosen}"
    save_env saved_entry
  fi
}

function load_video {
  if [ x$feature_all_video_module = xy ]; then
    insmod all_video
  else
    insmod efi_gop
    insmod efi_uga
    insmod ieee1275_fb
    insmod vbe
    insmod vga
    insmod video_bochs
    insmod video_cirrus
  fi
}

set menu_color_normal=light-gray/black
set menu_color_highlight=light-magenta/black

if [ x$feature_default_font_path = xy ] ; then
   font=unicode
else
insmod part_gpt
insmod btrfs
search --no-floppy --fs-uuid --set=root 8853204a-e5fd-4b2e-b2da-d0154c07f26c
    font="/usr/share/grub/unicode.pf2"
fi

## start header steamenv sub block
insmod steamenv
steamenv_loader_mode=auto
steamenv_kernel_mode=keep
steamenv_quiet="loglevel=3 splash quiet plymouth.ignore-serial-consoles fbcon=vc:4-6"
steamenv_noisy="loglevel=5 sysrq_always_enabled splash=verbose fbcon=nodefer"
steamenv_verbosity=""
timeout=0
timeout_style=menu
steamenv_init
## end steamenv header sub block

if loadfont $font ; then
  set gfxmode=${steamenv_loader_mode}
  load_video
  insmod gfxterm
  set locale_dir=$prefix/locale
  set lang=en_US
  insmod gettext
fi
terminal_input console
terminal_output gfxterm
insmod part_gpt
insmod btrfs
search --no-floppy --fs-uuid --set=root 8853204a-e5fd-4b2e-b2da-d0154c07f26c
if [ "$timeout:$timeout_style" = "-1:menu" ];
then
  insmod gfxmenu
  loadfont ($root)/usr/share/grub/themes/breeze/unifont-bold-16.pf2
  loadfont ($root)/usr/share/grub/themes/breeze/unifont-regular-14.pf2
  loadfont ($root)/usr/share/grub/themes/breeze/unifont-regular-16.pf2
  insmod png
  set theme=($root)/usr/share/grub/themes/breeze/theme.txt
  export theme
fi
### END /etc/grub.d/00_header ###

### BEGIN /etc/grub.d/10_linux ###
