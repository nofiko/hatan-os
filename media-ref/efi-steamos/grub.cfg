	menuentry 'SteamOS, with Linux linux-neptune-611 (fallback initramfs)' --class steamos --class gnu-linux --class gnu --class os $menuentry_id_option 'gnulinux-linux-neptune-611-fallback-8853204a-e5fd-4b2e-b2da-d0154c07f26c' {
