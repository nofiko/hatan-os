#
# HATAN OS — pacstrap فقط (بدون مستودع hatan-os المحلي)
# يُستخدم قبل نسخ /opt/hatan-os إلى القرص الجديد
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

IgnorePkg   = linux linux-headers linux-neptune linux-neptune-headers \
              gamescope steam-jupiter-stable jupiter-hw-support jupiter-legacy-support \
              jupiter-fan-control mesa linux-firmware-neptune wireplumber sddm-wayland \
              holo-keyring holo-wireplumber

[jupiter-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[holo-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[core-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[extra-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[community-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[multilib-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

# احتياط — تبعيات ناقصة من Valve
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
