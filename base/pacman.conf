#
# HATAN OS — pacman.conf
# أساس SteamOS (Holo): مستودعات Valve فقط — مثل Steam Deck الرسمي
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# حزم Deck — لا تُستبدل بحزم Arch العامة
IgnorePkg   = linux linux-headers linux-neptune linux-neptune-headers \
              gamescope steam-jupiter-stable jupiter-hw-support jupiter-legacy-support \
              jupiter-fan-control mesa linux-firmware-neptune wireplumber sddm-wayland \
              holo-keyring holo-wireplumber

# ── Deck: تعريفات ونواة ─────────────────────────────────
[jupiter-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

# ── Holo: إعدادات SteamOS ───────────────────────────────
[holo-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

# ── أساس Arch المعدّل لـ SteamOS (بدل archlinux.org) ───
[core-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[extra-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[community-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[multilib-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

# ── HATAN OS (حزم مخصصة — بعد البناء) ──────────────────
[hatan-os]
SigLevel = Optional TrustAll
Server = file:///opt/hatan-os/repo
