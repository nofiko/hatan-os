#
# HATAN OS - pacman.conf
# Arch Linux + مستودعات Valve لـ Steam Deck
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# حزم Valve — لا تُحدَّث من مستودعات Arch العادية
IgnorePkg   = linux linux-headers linux-neptune linux-neptune-headers gamescope steam-jupiter-stable jupiter-hw-support jupiter-legacy-support jupiter-fan-control mesa linux-firmware-neptune wireplumber sddm-wayland

# ── مستودعات Arch الرسمية ──────────────────────────────
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ── مستودعات Valve (Steam Deck) ────────────────────────
[jupiter-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

[holo-main]
Server = https://steamdeck-packages.steamos.cloud/archlinux-mirror/$repo/os/$arch
SigLevel = Never

# ── HATAN OS (حزمك المخصصة — بعد البناء) ───────────────
[hatan-os]
SigLevel = Optional TrustAll
Server = file:///opt/hatan-os/repo
