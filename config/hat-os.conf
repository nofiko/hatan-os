# HATAN OS - الإعدادات الرئيسية

[HATAN]
name="HATAN OS"
version="0.1.0"
codename="Genesis"
device="steam-deck-lcd"

[Theme]
primary="#2563EB"
secondary="#F5F5F5"
background="#020818"
surface="#0A1224"
text="#E8F4FF"
accent="#22D3EE"
font_family="Cairo, Segoe UI, sans-serif"
font_size="16"

[UI]
shell="hatan-shell"
fullscreen=true
show_clock=true
show_battery=true
language="ar"

[Boot]
splash_image="themes/splash/boot.png"
boot_timeout=3

[Hardware]
valve_repos="jupiter-main,holo-main"
kernel="linux-neptune"
fan_control=true
audio_dsp=true

[DefaultApps]
# التطبيقات الافتراضية المثبتة مع النظام
steam="steam"
xbox="flatpak run io.github.unknownskl.greenlight"
microsoft_store="flatpak run com.microsoft.Edge --new-window https://apps.microsoft.com/store/apps"
brave="flatpak run com.brave.Browser"
files="dolphin ~/"
settings="systemsettings"
exe_apps="lutris"
default_browser="brave"

[Repositories]
valve_mirror="https://steamdeck-packages.steamos.cloud/archlinux-mirror"
